<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kasir — Mie Ayam Bangka Awat</title>
  <style>
    :root{
      --bg:#0f0d0b;--card:#181410;--muted:#9a8878;--text:#f0e8d8;--gold:#e8a000;
      --line:rgba(255,210,140,.12);--danger:#8f1f1f;
    }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{margin:0;background:var(--bg);color:var(--text)}
    header{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center}
    h1{margin:0;font-size:20px;color:var(--gold)}
    .muted{color:var(--muted);font-size:13px}
    .wrap{padding:16px;display:grid;grid-template-columns:1fr;gap:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
    .kpi{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;padding:10px}
    .kpi .v{font-size:20px;font-weight:800}
    .kpi .l{font-size:12px;color:var(--muted)}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .btn{border:1px solid var(--line);background:#221d18;color:var(--text);padding:8px 10px;border-radius:8px;cursor:pointer}
    .btn.active{border-color:var(--gold);color:var(--gold)}
    .btn-primary{background:var(--gold);color:#1a1007;border:none;font-weight:700}
    .btn-danger{background:var(--danger);color:#fff;border:1px solid rgba(255,255,255,.2)}
    .btn-reset{
      border:none;
      color:#1a1007;
      font-weight:800;
      letter-spacing:.2px;
      background:linear-gradient(135deg,#ffd36a 0%, #e8a000 55%, #cc8700 100%);
      box-shadow:0 8px 18px rgba(232,160,0,.25), inset 0 1px 0 rgba(255,255,255,.35);
      border-radius:999px;
      padding:8px 12px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      transition:transform .15s ease, box-shadow .2s ease, filter .2s ease, opacity .2s ease;
    }
    .btn-reset:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 24px rgba(232,160,0,.35), inset 0 1px 0 rgba(255,255,255,.45);
      filter:saturate(1.05);
    }
    .btn-reset:active{ transform:translateY(0); }
    .btn-reset:disabled{ opacity:.7; cursor:not-allowed; transform:none; }
    .btn-reset.is-success{
      background:linear-gradient(135deg,#84d889 0%, #4caf50 60%, #2e7d32 100%);
      color:#fff;
      box-shadow:0 10px 22px rgba(76,175,80,.35);
    }
    .btn-meja-terisi{
      background:linear-gradient(135deg,#9be7a2 0%, #43a047 55%, #2e7d32 100%);
      color:#fff;
      border:none;
      box-shadow:0 10px 22px rgba(67,160,71,.35), inset 0 1px 0 rgba(255,255,255,.25);
    }
    .btn-meja-kosong{
      background:#3a3128;
      color:#c5b6a6;
      border:1px solid rgba(255,210,140,.18);
      border-radius:999px;
      padding:8px 12px;
      font-weight:700;
      cursor:not-allowed;
      opacity:.85;
    }
    table{width:100%;border-collapse:collapse}
    th,td{padding:9px 8px;border-bottom:1px solid rgba(255,210,140,.08);font-size:13px;text-align:left;vertical-align:top}
    th{color:var(--gold)}
    .badge{padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;display:inline-block}
    .s-baru{background:rgba(21,101,192,.2);color:#90caf9}
    .s-diproses{background:rgba(239,108,0,.2);color:#ffcc80}
    .s-sudah_dibayar{background:rgba(46,125,50,.2);color:#a5d6a7}
    .s-selesai{background:rgba(120,120,120,.2);color:#ddd}
    .empty{color:var(--muted);padding:10px 0}
    @media(max-width:980px){.kpis{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Kasir Mie Ayam Awat</h1>
    </div>
    <div class="muted" id="clock">-</div>
  </header>

  <div class="wrap">
    <section class="card">
      <div class="kpis">
        <div class="kpi"><div class="v" id="kpi-order">0</div><div class="l">Jumlah Order</div></div>
        <div class="kpi"><div class="v" id="kpi-paid">0</div><div class="l">Sudah Dibayar</div></div>
        <div class="kpi"><div class="v" id="kpi-omzet">Rp 0</div><div class="l">Omzet Hari Ini</div></div>
      </div>

<div class="toolbar">
        <button class="btn active" data-filter="semua">Semua</button>
        <button class="btn" data-filter="baru">Baru</button>
        <button class="btn" data-filter="diproses">Diproses</button>
        <button class="btn" data-filter="sudah_dibayar">Sudah Dibayar</button>
        <button class="btn" data-filter="selesai">Selesai</button>
<button class="btn btn-primary" id="btn-refresh">Refresh</button>
        <button class="btn btn-danger" id="btn-reset-omzet">🔄 Reset Omzet</button>

<button class="btn btn-primary" id="btn-kelola-menu">🍽️ Kelola Menu</button>
        <button class="btn btn-primary" id="btn-laporan">📊 Laporan</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Meja</th>
            <th>Status</th>
            <th>Waktu</th>
            <th>Total</th>
            <th>Aksi Meja</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
      <div id="msg" class="muted" style="margin-top:8px;"></div>
    </section>
  </div>

  <script>
    const API_BASE = '/api';
    let state = { orders: [], payments: [], tables: [], filter: 'semua' };

    function idr(n){ const x = Number(n)||0; return 'Rp ' + x.toLocaleString('id-ID'); }
    function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'<','>':'>','"':'"',"'":'&#39;' }[m])); }
    function setMsg(t){ document.getElementById('msg').textContent = t || ''; }

    async function req(path, opts){
      const r = await fetch(API_BASE + path, opts);
      const data = await r.json().catch(()=>null);
      if(!r.ok) throw new Error(data?.error || ('HTTP ' + r.status));
      return data;
    }

    function statusBadge(s){
      const raw = String(s || '');
      const label = raw === 'sudah_dibayar' ? 'LUNAS' : raw;
      return '<span class="badge s-' + esc(raw) + '">' + esc(label) + '</span>';
    }

    function getTableStatus(mejaId){
      const row = state.tables.find(t => String(t.id) === String(mejaId));
      return row ? String(row.status || '') : '';
    }

    function recalcKpi(){
      const orders = state.orders;
      const paidCount = orders.filter(o => String(o.status) === 'sudah_dibayar').length;
      const omzet = state.payments.reduce((a,p)=>a + Number(p.amount||0),0);
      document.getElementById('kpi-order').textContent = String(orders.length);
      document.getElementById('kpi-paid').textContent = String(paidCount);
      document.getElementById('kpi-omzet').textContent = idr(omzet);
    }

    function filteredOrders(){
      if(state.filter === 'semua') return state.orders;
      return state.orders.filter(o => String(o.status) === state.filter);
    }

    function renderOrders(){
      const body = document.getElementById('orders-body');
      const rows = filteredOrders();
      body.innerHTML = '';
      if(!rows.length){
        body.innerHTML = '<tr><td colspan="6" class="empty">Tidak ada data.</td></tr>';
        return;
      }
      rows.forEach(o => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${esc(o.id)}</td>
          <td>${esc(o.meja ?? '-')}</td>
          <td>${statusBadge(String(o.status||''))}</td>
          <td>${esc(new Date(o.timestamp||0).toLocaleString('id-ID'))}</td>
          <td>${idr(o.total||0)}</td>
          <td>
            ${
              o.meja
                ? (getTableStatus(o.meja) === 'terpakai'
                    ? `<button class="btn btn-reset btn-meja-terisi" data-act="reset-meja" data-meja="${esc(o.meja)}">✅ Meja Terisi</button>`
                    : `<button class="btn btn-meja-kosong" disabled>🪑 Meja Kosong</button>`)
                : '-'
            }
          </td>
        `;
        body.appendChild(tr);
      });
    }

    async function resetMeja(mejaId){
      if(!mejaId) return;
      await req('/tables/' + encodeURIComponent(mejaId), {
        method:'PATCH',
        body: JSON.stringify({ status: 'kosong' }),
        headers: { 'Content-Type': 'application/json' }
      });
    }

    async function loadAll(){
      try{
        const [orders, payments, tables] = await Promise.all([ req('/orders'), req('/payments'), req('/tables') ]);
        state.orders = Array.isArray(orders) ? orders : [];
        state.payments = Array.isArray(payments) ? payments : [];
        state.tables = Array.isArray(tables) ? tables : [];
        recalcKpi();
        renderOrders();
      }catch(e){
        setMsg('Gagal load data: ' + e.message);
      }
    }

    document.getElementById('orders-body').addEventListener('click', async (ev) => {
      const btn = ev.target.closest('button[data-act]');
      if(!btn) return;
      const mejaId = btn.getAttribute('data-meja');
      const act = btn.getAttribute('data-act');

      if (act === 'reset-meja') {
        const originalText = btn.textContent;
        try{
          btn.disabled = true;
          btn.textContent = '⏳ Mereset...';
          await resetMeja(mejaId);
          btn.textContent = '✅ Berhasil';
          btn.classList.add('is-success');
          setMsg(`Status meja ${mejaId} berhasil direset ke kosong.`);
          await loadAll();
        }catch(e){
          setMsg('Gagal reset meja: ' + e.message);
          btn.disabled = false;
          btn.textContent = originalText;
        } finally {
          setTimeout(() => {
            btn.classList.remove('is-success');
            btn.disabled = false;
            btn.textContent = originalText;
          }, 900);
        }
      }
    });

    document.querySelectorAll('.toolbar .btn[data-filter]').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.toolbar .btn[data-filter]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        state.filter = b.getAttribute('data-filter');
        renderOrders();
      });
    });

document.getElementById('btn-refresh').addEventListener('click', loadAll);

    document.getElementById('btn-reset-omzet').addEventListener('click', async () => {
      if(!confirm('Reset omzet hari ini? Data transaksi akan dihapus.')) return;
      try{
        await req('/payments/reset', { method: 'DELETE' });
        setMsg('Omzet berhasil direset.');
        await loadAll();
      }catch(e){
        setMsg('Gagal reset omzet: ' + e.message);
      }
    });

// Laporan Penjualan Modal
    const laporanModal = document.createElement('div');
    laporanModal.id = 'laporan-modal';
    laporanModal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9999';
    laporanModal.innerHTML = `
      <div style="background:#222;padding:20px;border-radius:12px;width:90%;max-width:700px;max-height:90vh;overflow:auto">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h2 style="color:#e8a000;margin:0">📊 Laporan Penjualan</h2>
<button id="btn-close-laporan" style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer">&times;</button>
        </div>
        <button id="btn-cetak-excel" style="background:#217346;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:bold;margin-bottom:16px">📥 Cetak Excel</button>
        <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
          <button id="btn-laporan-hari" style="background:#e8a000;color:#000;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:bold">Hari Ini</button>
          <button id="btn-laporan-minggu" style="background:#333;color:#fff;border:1px solid #555;padding:8px 16px;border-radius:6px;cursor:pointer">Minggu Ini</button>
          <button id="btn-laporan-bulan" style="background:#333;color:#fff;border:1px solid #555;padding:8px 16px;border-radius:6px;cursor:pointer">Bulan Ini</button>
        </div>
        <div id="laporan-stats" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
          <div style="background:#333;padding:16px;border-radius:8px;text-align:center">
            <div id="laporan-total" style="font-size:24px;font-weight:bold;color:#4caf50">Rp 0</div>
            <div style="color:#888;font-size:12px">Total Penjualan</div>
          </div>
          <div style="background:#333;padding:16px;border-radius:8px;text-align:center">
            <div id="laporan-count" style="font-size:24px;font-weight:bold;color:#e8a000">0</div>
            <div style="color:#888;font-size:12px">Jumlah Transaksi</div>
          </div>
          <div style="background:#333;padding:16px;border-radius:8px;text-align:center">
            <div id="laporan-rata" style="font-size:24px;font-weight:bold;color:#64b5f6">Rp 0</div>
            <div style="color:#888;font-size:12px">Rata-rata</div>
          </div>
        </div>
        <div style="margin-bottom:16px">
          <h3 style="color:#e8a000;margin:0 0 10px 0;font-size:14px">Metode Pembayaran</h3>
          <div id="laporan-metode" style="display:flex;gap:10px;flex-wrap:wrap"></div>
        </div>
        <div>
          <h3 style="color:#e8a000;margin:0 0 10px 0;font-size:14px">Detail Transaksi</h3>
          <table id="laporan-table" style="width:100%;border-collapse:collapse">
            <thead>
              <tr style="border-bottom:1px solid #444">
                <th style="padding:8px;text-align:left;color:#e8a000">Waktu</th>
                <th style="padding:8px;text-align:left;color:#e8a000">Order ID</th>
                <th style="padding:8px;text-align:left;color:#e8a000">Metode</th>
                <th style="padding:8px;text-align:right;color:#e8a000">Jumlah</th>
              </tr>
            </thead>
            <tbody id="laporan-body"></tbody>
          </table>
        </div>
      </div>
    `;
document.body.appendChild(laporanModal);

    let allPayments = [];
    let currentLaporanRange = { from: null, to: null };
    async function loadLaporan(fromMs, toMs){
      currentLaporanRange = { from: fromMs, to: toMs };
      const query = '?from=' + fromMs + '&to=' + toMs;
      const data = await req('/reports/sales' + query);
      if(!data) return;
      const { total, count, byMethod } = data;
      const rata = count > 0 ? Math.round(total / count) : 0;
      document.getElementById('laporan-total').textContent = idr(total);
      document.getElementById('laporan-count').textContent = String(count);
      document.getElementById('laporan-rata').textContent = idr(rata);
      
      const metodeDiv = document.getElementById('laporan-metode');
      if(byMethod && Object.keys(byMethod).length){
        metodeDiv.innerHTML = Object.entries(byMethod).map(([m, v]) => 
          '<span style="background:#333;padding:4px 10px;border-radius:4px;font-size:12px">' + esc(m) + ': ' + idr(v) + '</span>'
        ).join('');
      }else{
        metodeDiv.innerHTML = '<span style="color:#888">Belum ada data.</span>';
      }
      
      // Load recent payments for detail
      const payments = await req('/payments');
      allPayments = Array.isArray(payments) ? payments : [];
      renderLaporanDetail(fromMs, toMs);
    }
    function renderLaporanDetail(fromMs, toMs){
      const tbody = document.getElementById('laporan-body');
      const filtered = allPayments.filter(p => {
        const t = p.paid_at || 0;
        if(fromMs && t < fromMs) return false;
        if(toMs && t > toMs) return false;
        return true;
      }).slice(0, 50);
      if(!filtered.length){
        tbody.innerHTML = '<tr><td colspan="4" style="padding:16px;color:#888;text-align:center">Belum ada transaksi.</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(p => `
        <tr style="border-bottom:1px solid #333">
          <td style="padding:8px">${esc(new Date(p.paid_at||0).toLocaleString('id-ID'))}</td>
          <td style="padding:8px;font-size:12px">${esc(p.order_id||'-')}</td>
          <td style="padding:8px"><span style="background:#333;padding:2px 6px;border-radius:4px;font-size:11px">${esc(p.method||'tunai')}</span></td>
          <td style="padding:8px;text-align:right;color:#4caf50">${idr(p.amount)}</td>
        </tr>
      `).join('');
    }

    function getRange(type){
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if(type === 'hari'){
        return { from: start.getTime(), to: now.getTime() };
      }else if(type === 'minggu'){
        const day = start.getDay();
        const diff = day === 0 ? 6 : day - 1;
        const monday = new Date(start);
        monday.setDate(start.getDate() - diff);
        return { from: monday.getTime(), to: now.getTime() };
      }else if(type === 'bulan'){
        const bulan = new Date(start.getFullYear(), start.getMonth(), 1);
        return { from: bulan.getTime(), to: now.getTime() };
      }
      return { from: null, to: null };
    }

    document.getElementById('btn-laporan').addEventListener('click', () => {
      laporanModal.style.display = 'flex';
      const range = getRange('hari');
      loadLaporan(range.from, range.to);
      document.getElementById('btn-laporan-hari').style.background = '#e8a000';
      document.getElementById('btn-laporan-minggu').style.background = '#333';
      document.getElementById('btn-laporan-bulan').style.background = '#333';
    });
    document.getElementById('btn-close-laporan').addEventListener('click', () => {
      laporanModal.style.display = 'none';
    });
    laporanModal.addEventListener('click', (e) => {
      if(e.target === laporanModal) laporanModal.style.display = 'none';
    });
    
['hari','minggu','bulan'].forEach(type => {
      document.getElementById('btn-laporan-' + type).addEventListener('click', () => {
        const range = getRange(type);
        loadLaporan(range.from, range.to);
        document.querySelectorAll('[id^="btn-laporan-"]').forEach(b => b.style.background = '#333');
        document.getElementById('btn-laporan-' + type).style.background = '#e8a000';
      });
    });

// Cetak Excel
    document.getElementById('btn-cetak-excel').addEventListener('click', async () => {
      if(!allPayments.length){
        alert('Tidak ada data untuk diexport.');
        return;
      }
      const data = currentLaporanRange.from 
        ? allPayments.filter(p => {
            const t = p.paid_at || 0;
            return t >= currentLaporanRange.from && t <= currentLaporanRange.to;
          })
        : allPayments;
      
      if(!data.length){
        alert('Tidak ada data transaksi.');
        return;
      }
      
      // Build CSV content
      const headers = ['Waktu', 'Order ID', 'Metode Pembayaran', 'Jumlah'];
      const rows = data.map(p => [
        new Date(p.paid_at||0).toLocaleString('id-ID'),
        p.order_id || '',
        p.method || 'tunai',
        p.amount || 0
      ]);
      
      // Add total row
      const totalAmount = data.reduce((a,p) => a + Number(p.amount||0), 0);
      rows.push(['', '', 'TOTAL', totalAmount]);
      
      let csv = headers.join(',') + '\n';
      rows.forEach(row => {
        csv += row.map(cell => '"' + String(cell).replace(/"/g, '""') + '"').join(',') + '\n';
      });
      
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'laporan_penjualan_' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      setMsg('Laporan berhasil diexport.');
    });

// Kelola Menu
    const menuModal = document.createElement('div');
    menuModal.id = 'menu-modal';
    menuModal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9999';
    menuModal.innerHTML = `
      <div style="background:#222;padding:20px;border-radius:12px;width:90%;max-width:600px;max-height:90vh;overflow:auto">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h2 style="color:#e8a000;margin:0">🍽️ Kelola Menu</h2>
          <button id="btn-close-menu" style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer">&times;</button>
        </div>
        <form id="form-tambah-menu" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
          <input type="text" id="menu-name" placeholder="Nama Menu" required style="padding:8px;border-radius:6px;border:1px solid #444;background:#333;color:#fff">
          <input type="number" id="menu-price" placeholder="Harga" required style="padding:8px;border-radius:6px;border:1px solid #444;background:#333;color:#fff">
          <select id="menu-category" style="padding:8px;border-radius:6px;border:1px solid #444;background:#333;color:#fff">
            <option value="mie">Mie</option>
            <option value="minuman">Minuman</option>
            <option value="lainnya">Lainnya</option>
          </select>
          <button type="submit" style="background:#e8a000;color:#000;font-weight:bold;border:none;border-radius:6px;cursor:pointer">Tambah</button>
        </form>
        <table id="menu-table" style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="border-bottom:1px solid #444">
              <th style="padding:8px;text-align:left;color:#e8a000">Nama</th>
              <th style="padding:8px;text-align:left;color:#e8a000">Kategori</th>
              <th style="padding:8px;text-align:right;color:#e8a000">Harga</th>
              <th style="padding:8px;text-align:center;color:#e8a000">Aksi</th>
            </tr>
          </thead>
          <tbody id="menu-body"></tbody>
        </table>
      </div>
    `;
    document.body.appendChild(menuModal);

    let menuItems = [];
    async function loadMenuItems(){
      menuItems = await req('/menu');
      renderMenuItems();
    }
    function renderMenuItems(){
      const tbody = document.getElementById('menu-body');
      if(!menuItems.length){
        tbody.innerHTML = '<tr><td colspan="4" style="padding:16px;color:#888;text-align:center">Belum ada menu.</td></tr>';
        return;
      }
      tbody.innerHTML = menuItems.map(m => `
        <tr style="border-bottom:1px solid #333">
          <td style="padding:8px">${esc(m.name)}</td>
          <td style="padding:8px"><span style="background:#333;padding:2px 8px;border-radius:4px;font-size:12px">${esc(m.category||'lainnya')}</span></td>
          <td style="padding:8px;text-align:right">${idr(m.price)}</td>
          <td style="padding:8px;text-align:center">
            <button class="btn-delete-menu" data-id="${esc(m.id)}" style="background:#8f1f1f;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer">Hapus</button>
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('btn-kelola-menu').addEventListener('click', () => {
      menuModal.style.display = 'flex';
      loadMenuItems();
    });
    document.getElementById('btn-close-menu').addEventListener('click', () => {
      menuModal.style.display = 'none';
    });
    menuModal.addEventListener('click', (e) => {
      if(e.target === menuModal) menuModal.style.display = 'none';
    });

    document.getElementById('form-tambah-menu').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('menu-name').value.trim();
      const price = parseInt(document.getElementById('menu-price').value) || 0;
      const category = document.getElementById('menu-category').value;
      if(!name || price <= 0) return;
      try{
        await req('/menu', {
          method: 'POST',
          body: JSON.stringify({ name, price, category }),
          headers: { 'Content-Type': 'application/json' }
        });
        document.getElementById('menu-name').value = '';
        document.getElementById('menu-price').value = '';
        setMsg('Menu added.');
        loadMenuItems();
      }catch(err){
        setMsg('Error: ' + err.message);
      }
    });

    document.getElementById('menu-body').addEventListener('click', async (e) => {
      const btn = e.target.closest('.btn-delete-menu');
      if(!btn) return;
      const id = btn.getAttribute('data-id');
      if(!confirm('Hapus menu ini?')) return;
      try{
        await req('/menu/' + encodeURIComponent(id), { method: 'DELETE' });
        setMsg('Menu deleted.');
        loadMenuItems();
      }catch(err){
        setMsg('Error: ' + err.message);
      }
    });

    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleString('id-ID', {
        weekday:'long', day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'
      });
    }, 1000);

    setInterval(loadAll, 5000);
    loadAll();
  </script>
</body>
</html>
